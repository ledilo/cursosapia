<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ganamos Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

  <!-- HERO -->
  <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 bg-[radial-gradient(circle_at_center,#1a1a1a,black)]">
    
    <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">
      Jugá con confianza en <br>
      <span class="text-purple-500">la mejor plataforma</span>
    </h1>

    <a href="#" class="mt-8 px-8 py-4 bg-gradient-to-r from-purple-500 to-purple-700 rounded-full text-lg font-bold shadow-lg hover:scale-105 transition">
      WHATSAPP →
    </a>

    <p class="mt-4 text-gray-400">Escribinos y reclamá tu bono ahora</p>

  </section>

  <!-- BONUS -->
  <section class="py-16 px-6 flex justify-center">
    <div class="border border-purple-500 rounded-2xl p-8 max-w-md w-full text-center bg-[#0a0a0a] shadow-lg">
      
      <p class="text-purple-400 text-sm tracking-widest">• PROMO ACTIVADA •</p>
      
      <h2 class="text-4xl font-extrabold mt-4">BONO 30% EXTRA</h2>
      
      <p class="text-gray-400 mt-2">En tu primera carga y en estados</p>

    </div>
  </section>

  <!-- SOCIAL PROOF -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-6 py-3 rounded-xl shadow-xl border border-zinc-700">
    <p class="text-sm">Julián M. retiró <span class="text-purple-400 font-bold">$24.300 ARS</span></p>
  </div>

</body>
</html>
