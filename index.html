<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ganamos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white font-sans">

  <!-- HERO -->
  <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 relative overflow-hidden gap-6">

    <!-- glow background -->
    <div class="absolute w-[600px] h-[600px] bg-purple-600 opacity-20 blur-3xl rounded-full"></div>

    <!-- CONTENIDO -->
    <div class="relative z-10 flex flex-col items-center">

      <!-- LOGO -->
      <div class="mb-4 text-3xl font-extrabold tracking-wide">
        G<span class="text-purple-500">♠</span>NAMOS
      </div>

      <!-- HEADLINE -->
      <h1 class="text-4xl md:text-6xl font-extrabold leading-tight max-w-3xl">
        Jugá con confianza en <br>
        <span class="text-purple-500">la mejor plataforma</span>
      </h1>

      <!-- CTA -->
      <a href="https://wa.me/549XXXXXXXXXX?text=Quiero%20mi%20bono" 
         class="mt-6 flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-purple-500 to-purple-700 rounded-full text-lg font-bold shadow-lg hover:scale-105 transition">
        <i class="fab fa-whatsapp text-xl"></i>
        WHATSAPP →
      </a>

      <p class="mt-3 text-gray-400 text-sm">Escribinos y reclamá tu bono ahora</p>

      <!-- BONUS (AHORA CENTRADO EN MOBILE) -->
      <div class="mt-8 border border-purple-500 rounded-2xl p-6 max-w-md w-full text-center bg-[#0a0a0a] shadow-[0_0_30px_rgba(168,85,247,0.3)]">
        
        <p class="text-purple-400 text-xs tracking-widest">• PROMO ACTIVADA •</p>
        
        <h2 class="text-3xl font-extrabold mt-3">BONO 30% EXTRA</h2>
        
        <p class="text-gray-400 mt-2 text-sm">En tu primera carga y en estados</p>

      </div>

    </div>

  </section>

  <!-- SOCIAL PROOF -->
  <div id="noti" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-6 py-3 rounded-xl shadow-xl border border-zinc-700 text-sm">
    <span id="texto">Julián M. retiró <span class="text-purple-400 font-bold">$24.300 ARS</span></span>
  </div>

  <script>
    const nombres = ["Lucas","Martín","Sofía","Valentina","Franco","Micaela"];
    const montos = [12000,18500,24300,32000,15700,41000];

    setInterval(()=>{
      const n = nombres[Math.floor(Math.random()*nombres.length)];
      const m = montos[Math.floor(Math.random()*montos.length)];
      document.getElementById("texto").innerHTML = `${n} retiró <span class='text-purple-400 font-bold'>$${m.toLocaleString()} ARS</span>`;
    },4000);
  </script>

</body>
</html>
